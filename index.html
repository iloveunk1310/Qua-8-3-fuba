<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/3</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">

  <div class="lock-box">
    <h2>Enter Password 💖</h2>

    <input type="password" id="password" placeholder="Nhập mật khẩu">

    <br><br>

    <button onclick="checkPassword()">Unlock</button>

    <p id="error"></p>
  </div>

</div>


<!-- SWEET BOX -->
<div id="mainContent">

  <div class="deco">🌸</div>
  <div class="deco">💖</div>
  <div class="deco">✨</div>
  <div class="deco">⭐</div>
  <div class="deco">🌷</div>
  <div class="deco">💕</div>

  <h1>Chào<span>Mừng</span> Fuba Zuto 🎀</h1>

  <div class="grid">

    <div class="card" onclick="openMusicModal()">
      <div class="icon-wrap">🎵</div>
      <div class="label">Music</div>
    </div>

    <div class="card" onclick="openLetterModal()">
      <div class="icon-wrap">💌</div>
      <div class="label">Letter</div>
    </div>

    <div class="card" onclick="openImageModal()">
      <div class="icon-wrap">🖼️</div>
      <div class="label">Image</div>
    </div>

    <div class="card" onclick="openGiftModal()">
      <div class="icon-wrap">🎁</div>
      <div class="label">Gift</div>
    </div>

  </div>


  <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="m-icon" id="mIcon"></div>
      <h2 id="mTitle"></h2>
      <p id="mDesc"></p>
      <button class="close-btn" onclick="closeModalBtn()">Close ✕</button>
    </div>
  </div>

</div>


<script>

function checkPassword(){

let pass = document.getElementById("password").value;

if(pass === "1111"){   

document.getElementById("lockScreen").style.display="none";
document.getElementById("mainContent").style.display="block";

}else{

document.getElementById("error").innerText="Sai mật khẩu!";

}

}

</script>

<script src="script.js"></script>

</body>
</html>
